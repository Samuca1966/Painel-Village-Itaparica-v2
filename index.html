<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Itaparica · Acesso Restrito</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  #unlock-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #0f1e3c 0%, #1a3a6f 60%, #2855a8 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 9999;
    color: #1a1f36;
  }
  .unlock-card {
    background: white; padding: 40px 36px; border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 420px;
    text-align: center;
  }
  .unlock-card h1 {
    font-size: 22px; margin: 0 0 6px 0;
    color: #0f1e3c; font-weight: 700; letter-spacing: -0.3px;
  }
  .unlock-card .subtitle {
    font-size: 13px; color: #64748b; margin-bottom: 28px; line-height: 1.5;
  }
  .unlock-card .restricted {
    display: inline-block; background: #fef3c7; color: #92400e;
    padding: 4px 10px; border-radius: 4px; font-size: 11px;
    font-weight: 600; margin-bottom: 18px; letter-spacing: 0.3px;
  }
  .unlock-card label {
    display: block; text-align: left; font-size: 12px; font-weight: 600;
    color: #475569; margin-bottom: 6px; text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .unlock-card input {
    width: 100%; padding: 12px 14px; font-size: 15px;
    border: 1.5px solid #e2e8f0; border-radius: 8px;
    font-family: inherit; transition: border 0.15s;
    background: #f8fafc;
  }
  .unlock-card input:focus {
    outline: none; border-color: #2855a8; background: white;
    box-shadow: 0 0 0 3px rgba(40,85,168,0.12);
  }
  .unlock-card button {
    width: 100%; padding: 12px; font-size: 14px; font-weight: 700;
    background: #1a3a6f; color: white; border: none; border-radius: 8px;
    cursor: pointer; margin-top: 16px; font-family: inherit;
    transition: background 0.15s;
  }
  .unlock-card button:hover { background: #0f1e3c; }
  .unlock-card button:disabled { background: #94a3b8; cursor: wait; }
  .err {
    color: #dc2626; font-size: 12.5px; margin-top: 12px;
    min-height: 18px; font-weight: 500;
  }
  .footer-note {
    font-size: 10.5px; color: #94a3b8; margin-top: 24px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="unlock-overlay">
  <div class="unlock-card" id="unlock">
    <div class="restricted">CONFIDENCIAL</div>
    <h1>Village Itaparica</h1>
    <p class="subtitle">Painel Financeiro · Notas Comerciais EINDOM<br>1ª Emissão — Material restrito ao Comitê</p>
    <label for="pw">Chave de acesso</label>
    <input type="password" id="pw" name="vi-key" autocomplete="new-password"
           data-lpignore="true" data-1p-ignore data-form-type="other" autofocus>
    <button id="btn-unlock">Acessar</button>
    <div class="err" id="err"></div>
    <div class="footer-note">
      Este conteúdo está criptografado (AES-256). Sem a chave correta,
      nenhuma informação financeira é exposta no código-fonte.
    </div>
  </div>
</div>

const SALT    = "ynk86Xu/KcRojyPbNTk/GQ==";
const IV      = "oW0GbwJh4dHmE8P4";
const ITERATIONS = 250000;

const b64ToBytes = b64 => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

async function deriveKey(password) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64ToBytes(SALT), iterations: ITERATIONS, hash: "SHA-256" },
    keyMat,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function unlock() {
  const pwField = document.getElementById("pw");
  const btn = document.getElementById("btn-unlock");
  const err = document.getElementById("err");
  const pw = pwField.value;
  if (!pw) { err.textContent = "Digite a senha"; return; }

  err.textContent = "";
  btn.disabled = true;
  btn.textContent = "Descriptografando...";

  try {
    const key = await deriveKey(pw);
    const ptBuf = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: b64ToBytes(IV) },
      key,
      b64ToBytes(PAYLOAD)
    );
    const html = new TextDecoder().decode(ptBuf);

    // Substitui o body inteiro pelo painel descriptografado
    document.body.innerHTML = html;

    // Re-executar scripts: innerHTML não dispara <script>, então recriamos
    const scripts = Array.from(document.body.querySelectorAll("script"));
    for (const old of scripts) {
      const s = document.createElement("script");
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    }
  } catch (e) {
    err.textContent = "Senha incorreta";
    pwField.value = "";
    pwField.focus();
    btn.disabled = false;
    btn.textContent = "Acessar";
  }
}

document.getElementById("btn-unlock").addEventListener("click", unlock);
document.getElementById("pw").addEventListener("keydown", e => {
  if (e.key === "Enter") unlock();
});
</script>
